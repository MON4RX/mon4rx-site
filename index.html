<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
/>

<meta name="color-scheme" content="dark" />

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    -webkit-tap-highlight-color:transparent;
}

html{
    height:100%;
    overflow-x:hidden;
}

body{

    min-height:100dvh;
    width:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:
    max(24px, env(safe-area-inset-top))
    18px
    max(24px, env(safe-area-inset-bottom));

    overflow-x:hidden;

    font-family:
    Arial,
    Helvetica,
    sans-serif;

    color:white;

    position:relative;

    background:
    linear-gradient(
    rgba(0,0,0,0.78),
    rgba(0,0,0,0.78)),
    url("https://i.imgur.com/bupYX8o.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    background-attachment:scroll;

    isolation:isolate;

    -webkit-font-smoothing:antialiased;
}

/* =========================
   BACKGROUND FX
========================= */

body::before{

    content:"";

    position:fixed;
    inset:0;

    background-image:
    radial-gradient(
    rgba(255,0,140,0.12) 1px,
    transparent 1px);

    background-size:52px 52px;

    opacity:0.08;

    pointer-events:none;

    z-index:-2;
}

body::after{

    content:"";

    position:fixed;

    width:120%;
    height:120%;

    top:-10%;
    left:-10%;

    background:
    radial-gradient(
    circle,
    rgba(255,0,140,0.08) 0%,
    transparent 60%);

    opacity:0.45;

    filter:blur(28px);

    pointer-events:none;

    z-index:-1;
}

/* =========================
   CONTAINER
========================= */

.container{

    width:min(100%, 430px);

    text-align:center;

    position:relative;

    z-index:2;
}

/* =========================
   AVATAR
========================= */

.avatar{

    width:132px;
    height:132px;

    border-radius:50%;
    object-fit:cover;

    border:2px solid rgba(255,0,140,0.75);

    margin-bottom:24px;

    pointer-events:none;

    user-select:none;
    -webkit-user-drag:none;

    /* STATIC GLOW */

    box-shadow:
    0 0 22px rgba(255,0,140,0.40),
    0 0 50px rgba(255,0,140,0.14);
}

/* =========================
   TITLE
========================= */

h1{

    font-size:clamp(46px, 8vw, 64px);

    font-weight:900;

    letter-spacing:4px;

    color:#ff4db8;

    margin-bottom:10px;

    /* STATIC GLOW */

    text-shadow:
    0 0 18px rgba(255,0,140,0.75),
    0 0 40px rgba(255,0,140,0.18);
}

.subtitle{

    font-size:15px;

    opacity:0.82;

    margin-bottom:30px;

    letter-spacing:2px;
}

/* =========================
   BUTTONS
========================= */

.buttons{

    display:flex;
    flex-direction:column;

    gap:14px;

    align-items:center;
}

.buttons a{

    position:relative;

    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    width:min(92%, 360px);

    padding:15px 18px;

    border-radius:22px;

    text-decoration:none;

    color:white;

    font-size:18px;
    font-weight:600;

    border:1px solid rgba(255,0,140,0.20);

    background:
    linear-gradient(
    135deg,
    rgba(6,6,6,0.94),
    rgba(12,12,12,0.90));

    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);

    /* STATIC OUTSIDE GLOW */

    box-shadow:
    0 0 18px rgba(255,0,140,0.14),
    0 0 40px rgba(255,0,140,0.08);

    transition:
    transform 0.16s ease,
    box-shadow 0.20s ease,
    background 0.20s ease,
    border 0.20s ease;

    appearance:none;
    -webkit-appearance:none;

    outline:none;

    user-select:none;

    -webkit-touch-callout:none;
}

/* REMOVE IOS STUCK STATES */

.buttons a:focus,
.buttons a:focus-visible{

    outline:none;
}

/* SOFT LIGHT */

.buttons a::after{

    content:"";

    position:absolute;
    inset:0;

    border-radius:22px;

    background:

    radial-gradient(
    circle at 20% 20%,
    rgba(255,255,255,0.03),
    transparent 30%),

    radial-gradient(
    circle at 80% 35%,
    rgba(255,0,140,0.04),
    transparent 40%);

    opacity:0.30;

    pointer-events:none;
}

/* HOVER */

.buttons a:hover{

    transform:
    translateY(-2px)
    scale(1.01);

    box-shadow:
    0 0 26px rgba(255,0,140,0.25),
    0 0 55px rgba(255,0,140,0.12);
}

/* CLICK */

.buttons a:active{

    transform:
    scale(0.95);

    background:
    linear-gradient(
    135deg,
    rgba(120,0,70,0.96),
    rgba(40,0,24,0.96));

    border-color:
    rgba(255,0,140,1);

    /* STRONG CLICK GLOW */

    box-shadow:
    0 0 28px rgba(255,0,140,1),
    0 0 70px rgba(255,0,140,0.55),
    0 0 120px rgba(255,0,140,0.22);
}

/* FORCE NORMAL AFTER RELEASE */

.buttons a:not(:active){

    background:
    linear-gradient(
    135deg,
    rgba(6,6,6,0.94),
    rgba(12,12,12,0.90));
}

/* =========================
   ICONS
========================= */

.buttons i{

    font-size:20px;

    color:#ff4db8;

    flex-shrink:0;

    /* STATIC ICON GLOW */

    filter:
    drop-shadow(0 0 8px rgba(255,0,140,0.75))
    drop-shadow(0 0 16px rgba(255,0,140,0.20));
}

/* =========================
   FOOTER
========================= */

.footer{

    margin-top:26px;

    opacity:0.55;

    letter-spacing:3px;

    font-size:13px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:600px){

    .avatar{
        width:116px;
        height:116px;
    }

    .buttons a{

        width:90%;

        font-size:16px;

        padding:14px 16px;

        border-radius:20px;
    }

    .subtitle{
        font-size:14px;
    }

    .footer{
        font-size:12px;
    }
}

</style>
</head>

<script>

/* REMOVE IOS STUCK HIGHLIGHT */

document.querySelectorAll(".buttons a").forEach(button => {

    const clear = () => {

        button.blur();
    };

    button.addEventListener("touchend", clear);
    button.addEventListener("touchcancel", clear);
    button.addEventListener("mouseup", clear);

});
