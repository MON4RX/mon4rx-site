/>

content="dark"

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    -webkit-tap-highlight-color:transparent;
}

html{
    height:100%;
    overflow-x:hidden;

    text-size-adjust:100%;
    -webkit-text-size-adjust:100%;

    scroll-behavior:smooth;
}

body{

    min-height:100dvh;
    width:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:
    max(24px, env(safe-area-inset-top))
    18px
    max(24px, env(safe-area-inset-bottom));

    overflow-x:hidden;

    font-family:
    Arial,
    Helvetica,
    sans-serif;

    color:white;

    position:relative;

    background:
    linear-gradient(
    rgba(0,0,0,0.74),
    rgba(0,0,0,0.74)),

    url("https://i.imgur.com/bupYX8o.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    isolation:isolate;

    /* PERFORMANCE */

    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;

    touch-action:manipulation;
}

/* =========================
   BACKGROUND FX
========================= */

body::before{

    content:"";

    position:fixed;
    inset:0;

    background-image:
    radial-gradient(
    rgba(255,0,140,0.16) 1px,
    transparent 1px);

    background-size:42px 42px;

    opacity:0.18;

    animation:particles 28s linear infinite;

    pointer-events:none;

    z-index:-2;
}

body::after{

    content:"";

    position:fixed;

    width:140%;
    height:140%;

    top:-20%;
    left:-20%;

    background:
    radial-gradient(
    circle,
    rgba(255,0,140,0.10) 0%,
    transparent 60%);

    animation:bgMove 18s ease-in-out infinite;

    pointer-events:none;

    z-index:-1;
}

/* =========================
   MAIN
========================= */

.container{

    width:min(100%, 430px);

    text-align:center;

    position:relative;

    z-index:2;

    animation:floatContainer 7s ease-in-out infinite;
}

/* =========================
   AVATAR
========================= */

.avatar{

    width:132px;
    height:132px;

    border-radius:50%;
    object-fit:cover;

    border:2px solid rgba(255,0,140,0.72);

    margin-bottom:24px;

    user-select:none;
    -webkit-user-drag:none;

    pointer-events:none;

    box-shadow:
    0 0 18px rgba(255,0,140,0.38),
    0 0 45px rgba(255,0,140,0.18);

    animation:
    avatarFloat 6s ease-in-out infinite,
    avatarGlow 7s ease-in-out infinite;

    will-change:transform;
}

/* =========================
   TITLE
========================= */

h1{

    font-size:clamp(46px, 8vw, 64px);

    font-weight:900;

    letter-spacing:4px;

    color:#ff4db8;

    margin-bottom:10px;

    text-shadow:
    0 0 18px rgba(255,0,140,0.6),
    0 0 45px rgba(255,0,140,0.3);

    animation:
    titleGlow 7s ease-in-out infinite,
    flicker 12s infinite;
}

.subtitle{

    font-size:15px;

    opacity:0.82;

    margin-bottom:30px;

    letter-spacing:2px;
}

/* =========================
   BUTTONS
========================= */

.buttons{

    display:flex;
    flex-direction:column;

    gap:14px;

    align-items:center;
}

.buttons a{

    position:relative;

    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    width:min(92%, 360px);

    text-decoration:none;

    color:white;

    font-size:18px;
    font-weight:600;

    padding:15px 18px;

    border-radius:22px;

    border:1px solid rgba(255,255,255,0.05);

    background:
    linear-gradient(
    135deg,
    rgba(6,6,6,0.90),
    rgba(14,14,14,0.84));

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
    0 0 18px rgba(255,0,140,0.08),
    inset 0 0 18px rgba(255,255,255,0.015);

    transition:
    transform 0.20s cubic-bezier(.2,.8,.2,1),
    box-shadow 0.26s ease,
    background 0.26s ease,
    border 0.26s ease;

    transform:translateZ(0);

    will-change:transform;

    /* FIX IOS */

    appearance:none;
    -webkit-appearance:none;

    /* BETTER TOUCH */

    touch-action:manipulation;

    user-select:none;

    /* FIX LAG */

    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
}

/* LIQUID */

.buttons a::after{

    content:"";

    position:absolute;
    inset:0;

    border-radius:22px;

    background:

    radial-gradient(
    circle at 18% 25%,
    rgba(255,255,255,0.05),
    transparent 34%),

    radial-gradient(
    circle at 78% 32%,
    rgba(255,0,140,0.06),
    transparent 42%),

    radial-gradient(
    circle at 50% 100%,
    rgba(255,255,255,0.02),
    transparent 55%);

    mix-blend-mode:screen;

    opacity:0.75;

    pointer-events:none;
}

/* SHINE */

.buttons a::before{

    content:"";

    position:absolute;

    top:0;
    left:-140%;

    width:60%;
    height:100%;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent);

    transform:skewX(-24deg);

    animation:shine 8s linear infinite;
}

/* RANDOM LIQUID */

.buttons a:nth-child(1)::after{
    animation:liquid1 13s ease-in-out infinite;
}

.buttons a:nth-child(2)::after{
    animation:liquid2 17s ease-in-out infinite;
}

.buttons a:nth-child(3)::after{
    animation:liquid3 11s ease-in-out infinite;
}

.buttons a:nth-child(4)::after{
    animation:liquid4 15s ease-in-out infinite;
}

.buttons a:nth-child(5)::after{
    animation:liquid5 18s ease-in-out infinite;
}

/* HOVER */

.buttons a:hover{

    transform:
    translateY(-3px)
    scale(1.02);

    border-color:
    rgba(255,0,140,0.45);

    background:
    linear-gradient(
    135deg,
    rgba(12,12,12,0.96),
    rgba(28,0,18,0.92));

    box-shadow:
    0 0 32px rgba(255,0,140,0.30),
    0 0 75px rgba(255,0,140,0.10),
    inset 0 0 22px rgba(255,255,255,0.02);
}

/* CLICK */

.buttons a:active{

    transform:
    scale(0.95);

    transition:
    transform 0.08s ease,
    box-shadow 0.08s ease;

    background:
    linear-gradient(
    135deg,
    rgba(70,0,38,0.95),
    rgba(30,0,18,0.92));

    border-color:
    rgba(255,0,140,0.9);

    box-shadow:
    0 0 28px rgba(255,0,140,0.72),
    0 0 70px rgba(255,0,140,0.20);
}

/* RETURN NORMAL */

.buttons a:not(:active){

    transition:
    transform 0.25s cubic-bezier(.2,.8,.2,1),
    box-shadow 0.28s ease,
    background 0.28s ease,
    border 0.28s ease;
}

/* ICONS */

.buttons i{

    font-size:20px;

    color:#ff4db8;

    filter:
    drop-shadow(
    0 0 10px rgba(255,0,140,0.55));

    flex-shrink:0;
}

/* FOOTER */

.footer{

    margin-top:26px;

    opacity:0.55;

    letter-spacing:3px;

    font-size:13px;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes particles{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(-90px,-90px);
    }
}

@keyframes bgMove{

    0%{
        transform:translate(-4%,-4%);
    }

    50%{
        transform:translate(4%,4%);
    }

    100%{
        transform:translate(-4%,-4%);
    }
}

@keyframes floatContainer{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-5px);
    }
}

@keyframes avatarFloat{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }
}

@keyframes avatarGlow{

    0%,100%{

        box-shadow:
        0 0 18px rgba(255,0,140,0.35),
        0 0 45px rgba(255,0,140,0.12);
    }

    50%{

        box-shadow:
        0 0 35px rgba(255,0,140,0.75),
        0 0 80px rgba(255,0,140,0.24);
    }
}

@keyframes titleGlow{

    0%,100%{

        text-shadow:
        0 0 14px rgba(255,0,140,0.45),
        0 0 32px rgba(255,0,140,0.18);
    }

    50%{

        text-shadow:
        0 0 28px rgba(255,0,140,1),
        0 0 70px rgba(255,0,140,0.45);
    }
}

@keyframes flicker{

    0%,18%,22%,25%,53%,57%,100%{
        opacity:1;
    }

    20%,24%,55%{
        opacity:0.94;
    }
}

@keyframes shine{

    0%{
        left:-140%;
    }

    100%{
        left:150%;
    }
}

@keyframes liquid1{

    0%,100%{
        transform:
        translate(0,0)
        scale(1);
    }

    50%{
        transform:
        translate(3px,-2px)
        scale(1.02);
    }
}

@keyframes liquid2{

    0%,100%{
        transform:
        translate(0,0);
    }

    50%{
        transform:
        translate(-4px,2px);
    }
}

@keyframes liquid3{

    0%,100%{
        transform:
        rotate(0deg);
    }

    50%{
        transform:
        rotate(-0.5deg)
        translate(2px,2px);
    }
}

@keyframes liquid4{

    0%,100%{
        transform:
        translate(0,0)
        scale(1);
    }

    50%{
        transform:
        translate(-2px,-3px)
        scale(1.025);
    }
}

@keyframes liquid5{

    0%,100%{
        transform:
        translate(0,0);
    }

    50%{
        transform:
        translate(4px,-1px);
    }
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width:600px){

    body{
        background-attachment:scroll;
    }

    .avatar{
        width:116px;
        height:116px;
    }

    .buttons a{

        width:90%;

        font-size:16px;

        padding:14px 16px;

        border-radius:20px;
    }

    .subtitle{
        font-size:14px;
    }

    .footer{
        font-size:12px;
    }
}

/* SMALL DEVICES */

@media (max-width:360px){

    .buttons a{
        width:100%;
    }

    .container{
        max-width:100%;
    }
}

/* =========================
   PERFORMANCE MODE
========================= */

@media (prefers-reduced-motion:reduce){

    *,
    *::before,
    *::after{

        animation:none !important;
        transition:none !important;
    }
}

</style>
