<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>MON4RX</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;

    color:white;

    position:relative;

    background:
    linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
    url("https://i.imgur.com/bupYX8o.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* PARTICLES */

body::before{

    content:"";

    position:absolute;

    inset:0;

    background-image:
    radial-gradient(#ff008c55 1px,transparent 1px);

    background-size:42px 42px;

    animation:particles 22s linear infinite;

    opacity:0.22;

    pointer-events:none;
}

/* MAIN */

.container{

    width:100%;
    max-width:440px;

    padding:25px;

    text-align:center;

    position:relative;

    z-index:2;
}

/* AVATAR */

.avatar{

    width:135px;
    height:135px;

    border-radius:50%;

    object-fit:cover;

    border:3px solid #ff008c;

    margin-top:15px;
    margin-bottom:25px;

    box-shadow:
    0 0 20px #ff008c,
    0 0 40px #ff008c;

    animation:float 5s ease-in-out infinite;
}

/* TITLE */

h1{

    font-size:64px;

    color:#ff008c;

    letter-spacing:4px;

    margin-bottom:12px;

    animation:glow 5s ease-in-out infinite;
}

/* SUBTITLE */

.subtitle{

    font-size:18px;

    opacity:0.88;

    margin-bottom:42px;

    letter-spacing:2px;
}

/* BUTTONS */

.buttons{

    display:flex;
    flex-direction:column;

    gap:18px;
}

a{

    text-decoration:none;

    color:white;

    font-size:20px;

    padding:18px;

    border-radius:18px;

    border:2px solid #ff008c;

    background:rgba(0,0,0,0.42);

    backdrop-filter:blur(8px);

    transition:0.35s ease;

    box-shadow:
    0 0 10px rgba(255,0,140,0.22);
}

a:hover{

    background:#ff008c;

    transform:scale(1.04);

    box-shadow:
    0 0 20px #ff008c,
    0 0 45px #ff008c;
}

/* DONATE */

.donate{

    background:
    linear-gradient(
    90deg,
    rgba(255,0,140,0.18),
    rgba(255,0,140,0.35));

    animation:donateGlow 4s ease-in-out infinite;
}

/* FOOTER */

.footer{

    margin-top:32px;

    opacity:0.65;

    letter-spacing:3px;

    font-size:14px;
}

/* ANIMATIONS */

@keyframes glow{

    0%{
        text-shadow:
        0 0 10px #ff008c,
        0 0 20px #ff008c;
    }

    50%{
        text-shadow:
        0 0 18px #ff008c,
        0 0 38px #ff008c,
        0 0 60px #ff008c;
    }

    100%{
        text-shadow:
        0 0 10px #ff008c,
        0 0 20px #ff008c;
    }
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

@keyframes particles{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(-90px,-90px);
    }
}

@keyframes donateGlow{

    0%{
        box-shadow:
        0 0 12px rgba(255,0,140,0.3);
    }

    50%{
        box-shadow:
        0 0 25px rgba(255,0,140,0.7),
        0 0 45px rgba(255,0,140,0.35);
    }

    100%{
        box-shadow:
        0 0 12px rgba(255,0,140,0.3);
    }
}

/* MOBILE */

@media(max-width:600px){

    h1{
        font-size:52px;
    }

    .avatar{
        width:120px;
        height:120px;
    }

    a{
        font-size:18px;
        padding:16px;
    }
}

</style>
</head>
